<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Vision Training · VR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #08080c; font-family: system-ui, -apple-system, Segoe UI, sans-serif; color: #ccc; overflow: hidden; }
    a-scene { width: 100vw; height: 100vh; }

    /* HTML overlay (used outside immersive VR; auto-hidden inside the headset). */
    #overlay {
      position: absolute; inset: 0; z-index: 10; pointer-events: none;
    }
    #overlay > * { pointer-events: auto; }

    #top-right {
      position: absolute; top: 25px; right: 30px; color: #ccc;
      font-size: 18px; letter-spacing: 0.02em;
    }
    #top-left {
      position: absolute; top: 25px; left: 30px; color: #aaa;
      font-size: 14px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    #top-left button.ghost {
      background: rgba(80,80,90,0.35); color: rgba(255,255,255,0.65); border: none;
      min-width: 44px; height: 36px; padding: 0 12px; border-radius: 18px;
      font-size: 13px; font-weight: 600; letter-spacing: 0.04em; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #top-left button.ghost:hover { background: rgba(80,80,90,0.95); color: #fff; }

    select#routineSelect, select#dotColor {
      background: rgba(40,40,52,0.95); color: #e8e8ee;
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 14px; padding: 8px 12px; border-radius: 8px;
      min-height: 36px; cursor: pointer;
    }

    #left-sliders {
      position: absolute; bottom: 50px; left: 50px;
      display: flex; flex-direction: column; gap: 30px;
      opacity: 0.17; transition: opacity 0.22s ease;
      padding: 12px 16px 16px 16px; margin: -12px 0 0 -16px; border-radius: 14px;
    }
    #left-sliders:hover, #left-sliders:focus-within { opacity: 1; }
    label { color: #ccc; font-size: 16px; display: block; margin-bottom: 6px; }
    input[type="range"] {
      -webkit-appearance: none; height: 8px; width: 240px;
      background: #2a2a3a; border-radius: 5px; outline: none;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      background: linear-gradient(to right, #4a9eff var(--value-percent), #2a2a3a var(--value-percent));
      border-radius: 5px; height: 8px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 20px; height: 20px; background: #4a9eff;
      border-radius: 50%; cursor: pointer;
      box-shadow: 0 0 10px rgba(74, 158, 255, 0.45); margin-top: -6px;
    }
    input[type="range"]::-moz-range-track { background: #2a2a3a; border-radius: 5px; height: 8px; }
    input[type="range"]::-moz-range-thumb {
      width: 20px; height: 20px; background: #4a9eff; border-radius: 50%; cursor: pointer;
      box-shadow: 0 0 10px rgba(74, 158, 255, 0.45);
    }

    #bottom-arrows {
      position: absolute; bottom: 45px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 80px;
    }
    #bottom-arrows button {
      background: rgba(80,80,90,0.35); color: rgba(255,255,255,0.65); border: none;
      font-size: 26px; width: 55px; height: 55px; border-radius: 50%; cursor: pointer;
      transition: background 0.15s, color 0.15s, transform 0.15s;
    }
    #bottom-arrows button:hover { background: rgba(80,80,90,0.95); color: #fff; transform: scale(1.08); }

    #vr-hint {
      position: absolute; bottom: 14px; right: 18px; color: rgba(255,255,255,0.4);
      font-size: 12px; max-width: 320px; text-align: right; line-height: 1.4;
    }
    body.in-vr #overlay { display: none; }

    @media (max-width: 520px) {
      #top-left, #top-right, #vr-hint { display: none !important; }
      #left-sliders {
        bottom: calc(max(14px, env(safe-area-inset-bottom, 0px)) + 72px);
        left: max(12px, env(safe-area-inset-left, 0px));
        right: max(12px, env(safe-area-inset-right, 0px));
        gap: 12px; padding: 8px 0 10px; margin: 0;
      }
      #left-sliders input[type="range"] { width: 100%; }
      #bottom-arrows {
        bottom: max(12px, env(safe-area-inset-bottom, 0px));
        gap: min(22vw, 72px);
      }
    }
  </style>
</head>
<body>

<!-- =================== VR / 3D SCENE =================== -->
<a-scene
  background="color: #08080c"
  vr-mode-ui="enabled: true"
  renderer="antialias: true; colorManagement: true; foveationLevel: 1; highRefreshRate: true"
  device-orientation-permission-ui="enabled: false"
  trainer>

  <a-assets>
    <!-- Bullseye texture is generated by JS and assigned at runtime. -->
  </a-assets>

  <!-- Subtle ambient + key light keeps the scene readable without washing out the dark background. -->
  <a-entity light="type: ambient; color: #555; intensity: 0.45"></a-entity>
  <a-entity light="type: directional; color: #fff; intensity: 0.35" position="0 4 1"></a-entity>

  <!-- Camera rig: standing height 1.6 m. -->
  <a-entity id="rig" position="0 1.6 0">
    <a-entity id="cam" camera look-controls="pointerLockEnabled: false" position="0 0 0">
      <!-- Mouse cursor (desktop) so HTML overlay isn't strictly required for in-world buttons. -->
      <a-entity cursor="rayOrigin: mouse; fuse: false"
                raycaster="objects: .ui-btn; far: 25"
                visible="false"></a-entity>
    </a-entity>

    <!-- Hand controllers with laser pointers, used in VR. -->
    <a-entity id="leftHand"  laser-controls="hand: left"  raycaster="objects: .ui-btn; far: 25; lineColor: #4a9eff; lineOpacity: 0.6" vr-input="hand: left"></a-entity>
    <a-entity id="rightHand" laser-controls="hand: right" raycaster="objects: .ui-btn; far: 25; lineColor: #4a9eff; lineOpacity: 0.6" vr-input="hand: right"></a-entity>
  </a-entity>

  <!-- Single moving ball (used by most routines). Billboarded plane with bullseye texture. -->
  <a-entity id="ball" position="0 1.6 -2"
            geometry="primitive: plane; width: 0.1; height: 0.1"
            material="shader: flat; transparent: true; alphaTest: 0.05; side: double"
            ball-texture
            billboard></a-entity>

  <!-- Container for multi-target saccade routines (populated dynamically). -->
  <a-entity id="multi-balls"></a-entity>

  <!-- Floating in-world control panel (visible in VR, hidden when overlay is shown on desktop unless toggled). -->
  <a-entity id="vr-panel" position="0 0.65 -1.6" rotation="-25 0 0">
    <a-plane width="1.4" height="0.34" color="#101018" opacity="0.85"
             material="shader: flat; transparent: true"></a-plane>

    <a-text id="vrRoutineLabel" value="Circle"
            align="center" position="0 0.10 0.001"
            color="#e8e8ee" width="2.2"></a-text>
    <a-text id="vrInfoLabel" value="Speed 2.0   ·   Range 100%"
            align="center" position="0 0.025 0.001"
            color="#9aa0aa" width="1.6"></a-text>

    <!-- Buttons: Prev, Pause, Next, Speed-, Speed+ -->
    <a-entity position="0 -0.09 0.002">
      <a-plane class="ui-btn" data-action="prev"      width="0.22" height="0.10" position="-0.50 0 0" color="#23293a" material="shader: flat"></a-plane>
      <a-text  value="<"  align="center" position="-0.50 0 0.001" color="#fff" width="1.2"></a-text>

      <a-plane class="ui-btn" data-action="pause"     width="0.22" height="0.10" position="-0.25 0 0" color="#23293a" material="shader: flat"></a-plane>
      <a-text  id="vrPauseLabel" value="Pause" align="center" position="-0.25 0 0.001" color="#fff" width="0.9"></a-text>

      <a-plane class="ui-btn" data-action="next"      width="0.22" height="0.10" position=" 0.00 0 0" color="#23293a" material="shader: flat"></a-plane>
      <a-text  value=">"  align="center" position=" 0.00 0 0.001" color="#fff" width="1.2"></a-text>

      <a-plane class="ui-btn" data-action="speed-"    width="0.22" height="0.10" position=" 0.25 0 0" color="#23293a" material="shader: flat"></a-plane>
      <a-text  value="Spd -" align="center" position=" 0.25 0 0.001" color="#fff" width="0.9"></a-text>

      <a-plane class="ui-btn" data-action="speed+"    width="0.22" height="0.10" position=" 0.50 0 0" color="#23293a" material="shader: flat"></a-plane>
      <a-text  value="Spd +" align="center" position=" 0.50 0 0.001" color="#fff" width="0.9"></a-text>
    </a-entity>
  </a-entity>
</a-scene>

<!-- =================== HTML OVERLAY (desktop / non-VR) =================== -->
<div id="overlay">
  <div id="top-left">
    <button type="button" class="ghost" id="enterVrBtn" title="Enter VR">⌐ Enter VR</button>
    <button type="button" class="ghost" id="pauseBtn">Pause</button>
    <button type="button" class="ghost" id="recenterBtn" title="Recenter scene in front of you">Recenter</button>
    <span>Session <span id="sessionDisplay">0:00</span></span>
    <span>Color
      <select id="dotColor" aria-label="Dot colors">
        <option value="red" selected>Red / white</option>
        <option value="amber">Amber / white</option>
        <option value="cyan">Cyan / white</option>
        <option value="white">White / dark</option>
      </select>
    </span>
    <span>Routine
      <select id="routineSelect" aria-label="Choose routine"></select>
    </span>
  </div>

  <div id="top-right">
    <span id="routineName">Circle</span> · Speed <span id="speedDisplay">2.0</span> · Range <span id="rangeDisplay">100</span>%
  </div>

  <div id="left-sliders">
    <div><label for="speed">Speed</label><input type="range" id="speed" min="0.5" max="12" step="0.1" value="2.0"></div>
    <div><label for="size">Size</label><input type="range" id="size" min="12" max="80" step="1" value="32"></div>
    <div><label for="pathRange">Path range</label><input type="range" id="pathRange" min="35" max="100" step="1" value="100"></div>
  </div>

  <div id="bottom-arrows">
    <button type="button" id="prev" aria-label="Previous routine">←</button>
    <button type="button" id="next" aria-label="Next routine">→</button>
  </div>

  <div id="vr-hint">
    <strong>VR controls:</strong> Trigger = next · Grip = prev · A/X = pause · B/Y = toggle UI · Thumbstick ↑/↓ = speed
  </div>
</div>

<script>
/* ------------------------------------------------------------------
   Shared state
------------------------------------------------------------------ */
const palettes = {
  red:   { outer: [216, 20, 20],   inner: [255, 255, 255] },
  amber: { outer: [255, 170, 40],  inner: [255, 255, 255] },
  cyan:  { outer: [40, 210, 255],  inner: [255, 255, 255] },
  white: { outer: [248, 248, 252], inner: [22, 22, 30] }
};

const state = {
  current: 0,
  speed: 2.0,
  // dotSize is in original "px" units (12..80); converted to meters when sized in 3D.
  dotSize: 32,
  rangeScale: 1.0,
  paused: false,
  paletteKey: 'red',
  time: 0,
  sessionSec: 0,
  // Generic single-ball position state (relative to screen center, meters):
  px: 0, py: 0, pz: 0,
  // Per-routine helpers:
  zigzagY: 0, zigzagDir: 1, zigzagProgress: 0,
  vzigzagX: 0, vzigzagDir: 1, vzigzagProgress: 0,
  r2TargetX: 0, r2TargetY: 0, r2TargetZ: 0,
  lastRandomJump: 0, lastR2Change: 0,
  // Saccade routines:
  hBalls: [], hCurrent: 0, hDirection: 1,
  vBalls: [], vCurrent: 0, vDirection: 1,
  // Depth pulse:
  depthProgress: 0
};

const routines = [
  'Circle', 'Counter Circle', 'Horizontal', 'Vertical',
  'Diagonal TL-BR', 'Diagonal TR-BL',
  'Figure 8 Horizontal', 'Figure 8 Vertical',
  'Random', 'Random 2', 'Zigzag', 'Vertical Zigzag',
  'Horizontal Saccades', 'Vertical Saccades',
  'Depth Pulse', '3D Random'
];

/* "Screen" plane in front of the user. All 2D routines move on this plane.
   3D-only routines (Depth Pulse, 3D Random) move ball z relative to its center. */
const SCREEN = {
  cx: 0, cy: 1.6, cz: -2.0,
  w: 2.4, h: 1.6
};
const NEAR_Z = -0.7;   // closest comfortable distance
const FAR_Z  = -3.6;   // farthest

/* Pixel-size (12..80) → ball half-width in meters on the screen plane. */
function ballRadiusMeters() {
  // Map 12 → 0.025 m, 80 → 0.13 m, linear.
  const t = (state.dotSize - 12) / (80 - 12);
  return 0.025 + t * (0.13 - 0.025);
}

/* ------------------------------------------------------------------
   Bullseye texture (mirrors the original pre-rasterized look)
------------------------------------------------------------------ */
const ballCanvas = document.createElement('canvas');
ballCanvas.width = ballCanvas.height = 256;
let ballTexture = null;

function paintBallCanvas() {
  const c = ballCanvas;
  const sctx = c.getContext('2d');
  const w = c.width;
  const pal = palettes[state.paletteKey] || palettes.red;
  const [or, og, ob] = pal.outer;
  const [ir, ig, ib] = pal.inner;

  sctx.clearRect(0, 0, w, w);
  // Anti-aliased outer disc.
  sctx.fillStyle = `rgb(${or},${og},${ob})`;
  sctx.beginPath();
  sctx.arc(w / 2, w / 2, w * 0.46, 0, Math.PI * 2);
  sctx.fill();
  // Inner contrast dot (~48% of outer radius, like original).
  sctx.fillStyle = `rgb(${ir},${ig},${ib})`;
  sctx.beginPath();
  sctx.arc(w / 2, w / 2, w * 0.46 * 0.48, 0, Math.PI * 2);
  sctx.fill();

  if (ballTexture) ballTexture.needsUpdate = true;
}
paintBallCanvas();

/* ------------------------------------------------------------------
   A-Frame components
------------------------------------------------------------------ */

/* Build the CanvasTexture once the plane mesh is ready and assign it. */
AFRAME.registerComponent('ball-texture', {
  init() {
    const apply = () => {
      const mesh = this.el.getObject3D('mesh');
      if (!mesh) return;
      if (!ballTexture) {
        ballTexture = new THREE.CanvasTexture(ballCanvas);
        ballTexture.minFilter = THREE.LinearFilter;
        ballTexture.magFilter = THREE.LinearFilter;
        ballTexture.anisotropy = 4;
      }
      mesh.material.map = ballTexture;
      mesh.material.needsUpdate = true;
    };
    if (this.el.getObject3D('mesh')) apply();
    else this.el.addEventListener('object3dset', apply);
  }
});

/* Always face the active camera (works for both desktop and VR cameras). */
AFRAME.registerComponent('billboard', {
  tick() {
    const cam = this.el.sceneEl.camera;
    if (!cam) return;
    cam.getWorldPosition(this.el.object3D.userData._tmp ||= new THREE.Vector3());
    this.el.object3D.lookAt(this.el.object3D.userData._tmp);
  }
});

/* Track which controller buttons are pressed, drive routine/speed/pause. */
AFRAME.registerComponent('vr-input', {
  schema: { hand: { default: 'right' } },
  init() {
    this.thumbY = 0;
    this.thumbHandled = false;

    this.el.addEventListener('triggerdown', () => goNext());
    this.el.addEventListener('gripdown', () => goPrev());

    // Quest right controller: A=pause, B=toggle UI panel.
    // Quest left  controller: X=pause, Y=toggle UI panel.
    const pauseBtns = this.data.hand === 'right' ? ['abuttondown'] : ['xbuttondown'];
    const uiBtns    = this.data.hand === 'right' ? ['bbuttondown'] : ['ybuttondown'];
    pauseBtns.forEach(ev => this.el.addEventListener(ev, () => togglePause()));
    uiBtns   .forEach(ev => this.el.addEventListener(ev, () => toggleVrPanel()));

    this.el.addEventListener('thumbstickmoved', (e) => {
      this.thumbY = e.detail.y || 0;
    });
  },
  tick(t, dt) {
    // Continuous speed adjust while thumbstick is held.
    if (Math.abs(this.thumbY) > 0.4) {
      const delta = -this.thumbY * (dt / 1000) * 4; // ±4 units/sec at full deflection
      setSpeed(state.speed + delta);
    }
  }
});

/* Top-level system that runs the routine update loop and writes ball position(s). */
AFRAME.registerComponent('trainer', {
  init() {
    this.ball = document.querySelector('#ball');
    this.multi = document.querySelector('#multi-balls');
    this.lastTs = 0;

    // Click handling on in-world buttons.
    this.el.addEventListener('click', (e) => {
      const a = e.target && e.target.dataset && e.target.dataset.action;
      if (!a) return;
      if (a === 'next') goNext();
      else if (a === 'prev') goPrev();
      else if (a === 'pause') togglePause();
      else if (a === 'speed+') setSpeed(state.speed + 0.5);
      else if (a === 'speed-') setSpeed(state.speed - 0.5);
    });

    // Mark <body> when entering/leaving immersive VR so we can hide the HTML overlay.
    this.el.addEventListener('enter-vr', () => document.body.classList.add('in-vr'));
    this.el.addEventListener('exit-vr',  () => document.body.classList.remove('in-vr'));
  },
  tick(t, dt) {
    const dts = Math.min(dt / 1000, 0.05);
    if (!state.paused) {
      updateRoutine(dts);
      state.sessionSec += dt / 1000;
    }
    applyToScene();
    syncHud();
  }
});

/* ------------------------------------------------------------------
   Routine math (ported from original 2D, adapted to a 3D plane)
------------------------------------------------------------------ */
function resetRoutine() {
  state.time = 0;
  state.px = 0; state.py = 0; state.pz = 0;
  state.lastRandomJump = 0;
  state.lastR2Change = 0;
  state.r2TargetX = 0; state.r2TargetY = 0; state.r2TargetZ = 0;
  state.zigzagProgress = 0; state.zigzagY = -SCREEN.h * 0.2; state.zigzagDir = 1;
  state.vzigzagProgress = 0; state.vzigzagX = -SCREEN.w * 0.2; state.vzigzagDir = 1;
  state.depthProgress = 0;
  state.hDirection = 1; state.vDirection = 1;
  state.hBalls = []; state.vBalls = [];

  const name = routines[state.current];
  const r = ballRadiusMeters();
  const halfW = SCREEN.w / 2 - r;
  const halfH = SCREEN.h / 2 - r;

  if (name === 'Horizontal Saccades') {
    const xHalf = Math.min(halfW, 0.42 * SCREEN.w * state.rangeScale);
    for (let i = 0; i < 7; i++) {
      const startX = (i % 2 === 0) ? xHalf : -xHalf;
      const yi = -halfH + (i / 6) * (2 * halfH);
      state.hBalls.push({ x: startX, y: yi, dir: (i % 2 === 0) ? -1 : 1 });
    }
    state.hCurrent = 0;
  } else if (name === 'Vertical Saccades') {
    const yHalf = Math.min(halfH, 0.45 * SCREEN.h * state.rangeScale);
    for (let i = 0; i < 9; i++) {
      const startY = (i % 2 === 0) ? -yHalf : yHalf;
      const xi = -halfW + (i / 8) * (2 * halfW);
      state.vBalls.push({ x: xi, y: startY, dir: (i % 2 === 0) ? 1 : -1 });
    }
    state.vCurrent = 0;
  }

  rebuildMultiBalls();
}

/* Recreate child sphere/plane entities under #multi-balls to match the active routine. */
function rebuildMultiBalls() {
  const multi = document.querySelector('#multi-balls');
  while (multi.firstChild) multi.removeChild(multi.firstChild);

  const list = (routines[state.current] === 'Horizontal Saccades') ? state.hBalls
            : (routines[state.current] === 'Vertical Saccades')   ? state.vBalls
            : null;
  if (!list) return;

  const r = ballRadiusMeters() * 2; // plane width
  list.forEach((b, idx) => {
    const e = document.createElement('a-entity');
    e.setAttribute('geometry', `primitive: plane; width: ${r}; height: ${r}`);
    e.setAttribute('material', 'shader: flat; transparent: true; alphaTest: 0.05; side: double');
    e.setAttribute('ball-texture', '');
    e.setAttribute('billboard', '');
    e.setAttribute('position', `${SCREEN.cx + b.x} ${SCREEN.cy + b.y} ${SCREEN.cz}`);
    e.dataset.idx = String(idx);
    multi.appendChild(e);
  });
}

function updateRoutine(dt) {
  state.time += dt * state.speed;
  const name = routines[state.current];
  const r = ballRadiusMeters();
  const halfW = SCREEN.w / 2 - r;
  const halfH = SCREEN.h / 2 - r;
  const s = state.speed;
  const range = state.rangeScale;

  if (name === 'Circle') {
    const rad = Math.min(halfW, halfH) * range;
    state.px = rad * Math.cos(state.time * 2.4);
    state.py = rad * Math.sin(state.time * 2.4);
  }
  else if (name === 'Counter Circle') {
    const rad = Math.min(halfW, halfH) * range;
    state.px = rad * Math.cos(-state.time * 2.4);
    state.py = rad * Math.sin(-state.time * 2.4);
  }
  else if (name === 'Horizontal') {
    state.px = halfW * range * Math.sin(state.time * 2.2);
    state.py = 0;
  }
  else if (name === 'Vertical') {
    state.px = 0;
    state.py = halfH * range * Math.sin(state.time * 2.2);
  }
  else if (name === 'Diagonal TL-BR') {
    state.px =  halfW * range * Math.sin(state.time * 2.0);
    state.py =  halfH * range * Math.sin(state.time * 2.0);
  }
  else if (name === 'Diagonal TR-BL') {
    state.px =  halfW * range * Math.sin(state.time * 2.0);
    state.py = -halfH * range * Math.sin(state.time * 2.0);
  }
  else if (name === 'Figure 8 Horizontal') {
    state.px = halfW * range * Math.sin(state.time * 1.5);
    state.py = halfH * range * Math.sin(2 * state.time * 1.5);
  }
  else if (name === 'Figure 8 Vertical') {
    state.px = halfW * range * Math.sin(2 * state.time * 1.5);
    state.py = halfH * range * Math.sin(state.time * 1.5);
  }
  else if (name === 'Zigzag') {
    state.zigzagProgress += s * 1.8 * dt;
    state.px = halfW * range * Math.sin(state.zigzagProgress);
    state.zigzagY += 0.18 * state.zigzagDir * s * dt;
    if (state.zigzagY < -halfH) { state.zigzagY = -halfH; state.zigzagDir *= -1; }
    if (state.zigzagY >  halfH) { state.zigzagY =  halfH; state.zigzagDir *= -1; }
    state.py = state.zigzagY;
  }
  else if (name === 'Vertical Zigzag') {
    state.vzigzagProgress += s * 1.8 * dt;
    state.py = halfH * range * Math.sin(state.vzigzagProgress);
    state.vzigzagX += 0.18 * state.vzigzagDir * s * dt;
    if (state.vzigzagX < -halfW) { state.vzigzagX = -halfW; state.vzigzagDir *= -1; }
    if (state.vzigzagX >  halfW) { state.vzigzagX =  halfW; state.vzigzagDir *= -1; }
    state.px = state.vzigzagX;
  }
  else if (name === 'Random') {
    if (state.time - state.lastRandomJump > 1.9 / s) {
      state.px = (Math.random() * 2 - 1) * halfW * range;
      state.py = (Math.random() * 2 - 1) * halfH * range;
      state.lastRandomJump = state.time;
    }
  }
  else if (name === 'Random 2') {
    if (state.time - state.lastR2Change > 2.1 / s) {
      state.r2TargetX = (Math.random() * 2 - 1) * halfW * range;
      state.r2TargetY = (Math.random() * 2 - 1) * halfH * range;
      state.lastR2Change = state.time;
    }
    const k = 1 - Math.pow(0.78, dt * 60);
    state.px += (state.r2TargetX - state.px) * k;
    state.py += (state.r2TargetY - state.py) * k;
  }
  else if (name === 'Horizontal Saccades' && state.hBalls.length > 0) {
    const xHalf = Math.min(halfW, 0.42 * SCREEN.w * range);
    const left = -xHalf, right = xHalf;
    const ball = state.hBalls[state.hCurrent];
    ball.x += 1.8 * s * ball.dir * dt;
    if ((ball.dir === -1 && ball.x <= left) || (ball.dir === 1 && ball.x >= right)) {
      ball.x = ball.dir === -1 ? left : right;
      ball.dir *= -1;
      state.hCurrent += state.hDirection;
      if (state.hCurrent >= state.hBalls.length || state.hCurrent < 0) {
        state.hDirection *= -1;
        state.hCurrent += state.hDirection;
      }
    }
  }
  else if (name === 'Vertical Saccades' && state.vBalls.length > 0) {
    const yHalf = Math.min(halfH, 0.45 * SCREEN.h * range);
    const top = yHalf, bottom = -yHalf;
    const ball = state.vBalls[state.vCurrent];
    ball.y += 1.8 * s * ball.dir * dt;
    if ((ball.dir === 1 && ball.y >= top) || (ball.dir === -1 && ball.y <= bottom)) {
      ball.y = ball.dir === 1 ? top : bottom;
      ball.dir *= -1;
      state.vCurrent += state.vDirection;
      if (state.vCurrent >= state.vBalls.length || state.vCurrent < 0) {
        state.vDirection *= -1;
        state.vCurrent += state.vDirection;
      }
    }
  }
  else if (name === 'Depth Pulse') {
    // Ball stays centered horizontally; oscillates in depth between NEAR_Z and FAR_Z.
    state.depthProgress += s * 0.9 * dt;
    const center = (NEAR_Z + FAR_Z) / 2;
    const halfDepth = (FAR_Z - NEAR_Z) / 2;
    state.px = 0;
    state.py = 0;
    state.pz = center + halfDepth * range * Math.sin(state.depthProgress);
  }
  else if (name === '3D Random') {
    if (state.time - state.lastRandomJump > 2.0 / s) {
      state.px = (Math.random() * 2 - 1) * halfW * range;
      state.py = (Math.random() * 2 - 1) * halfH * range;
      // Random depth between near and far, pulled toward "screen depth" by (1-range).
      const tz = Math.random();
      const fullZ = NEAR_Z + tz * (FAR_Z - NEAR_Z);
      state.pz = fullZ * range; // Note: fullZ is negative; scaling by range pulls toward 0
      state.lastRandomJump = state.time;
    }
  }

  // Clamp the planar routines to the virtual screen.
  if (name !== 'Depth Pulse' && name !== '3D Random') {
    state.pz = 0;
    state.px = Math.max(-halfW, Math.min(halfW, state.px));
    state.py = Math.max(-halfH, Math.min(halfH, state.py));
  }
}

/* ------------------------------------------------------------------
   Apply state to the scene (move sphere(s), resize)
------------------------------------------------------------------ */
function applyToScene() {
  const ball = document.querySelector('#ball');
  if (!ball) return;
  const r = ballRadiusMeters();
  const sizeAttr = ball.getAttribute('geometry');
  const planeW = r * 2;
  if (sizeAttr && Math.abs((sizeAttr.width || 0) - planeW) > 0.001) {
    ball.setAttribute('geometry', `primitive: plane; width: ${planeW}; height: ${planeW}`);
  }

  const name = routines[state.current];
  const isMulti = (name === 'Horizontal Saccades' || name === 'Vertical Saccades');

  ball.object3D.visible = !isMulti;

  if (!isMulti) {
    // For Depth routines, p.z is an absolute world Z; otherwise add to SCREEN.cz (=-2).
    const isDepth = (name === 'Depth Pulse' || name === '3D Random');
    const wx = SCREEN.cx + state.px;
    const wy = SCREEN.cy + state.py;
    const wz = isDepth ? state.pz : SCREEN.cz;
    ball.object3D.position.set(wx, wy, wz);
  } else {
    // Update each child plane position from the routine's array.
    const list = (name === 'Horizontal Saccades') ? state.hBalls : state.vBalls;
    const multi = document.querySelector('#multi-balls');
    multi.childNodes.forEach((child, i) => {
      if (!list[i] || !child.object3D) return;
      child.object3D.position.set(SCREEN.cx + list[i].x, SCREEN.cy + list[i].y, SCREEN.cz);
    });
  }
}

/* ------------------------------------------------------------------
   HUD / UI helpers
------------------------------------------------------------------ */
const els = {
  routineName: document.getElementById('routineName'),
  speedDisplay: document.getElementById('speedDisplay'),
  rangeDisplay: document.getElementById('rangeDisplay'),
  sessionDisplay: document.getElementById('sessionDisplay'),
  speedSlider: document.getElementById('speed'),
  sizeSlider: document.getElementById('size'),
  pathRangeSlider: document.getElementById('pathRange'),
  routineSelect: document.getElementById('routineSelect'),
  dotColorSelect: document.getElementById('dotColor'),
  pauseBtn: document.getElementById('pauseBtn'),
  enterVrBtn: document.getElementById('enterVrBtn'),
  recenterBtn: document.getElementById('recenterBtn'),
  vrRoutineLabel: document.getElementById('vrRoutineLabel'),
  vrInfoLabel: document.getElementById('vrInfoLabel'),
  vrPauseLabel: document.getElementById('vrPauseLabel'),
  vrPanel: document.getElementById('vr-panel')
};

routines.forEach((name, i) => {
  const o = document.createElement('option');
  o.value = String(i);
  o.textContent = name;
  els.routineSelect.appendChild(o);
});

function updateSliderFill(slider) {
  const percent = ((+slider.value - +slider.min) / (+slider.max - +slider.min)) * 100;
  slider.style.setProperty('--value-percent', percent + '%');
}

function syncHud() {
  els.routineName.textContent = routines[state.current];
  els.speedDisplay.textContent = state.speed.toFixed(1);
  els.rangeDisplay.textContent = String(Math.round(state.rangeScale * 100));
  els.sessionDisplay.textContent = formatSession(state.sessionSec);
  els.pauseBtn.textContent = state.paused ? 'Resume' : 'Pause';
  if (els.vrRoutineLabel) els.vrRoutineLabel.setAttribute('value', routines[state.current]);
  if (els.vrInfoLabel) els.vrInfoLabel.setAttribute(
    'value',
    `Speed ${state.speed.toFixed(1)}   ·   Range ${Math.round(state.rangeScale * 100)}%   ·   ${formatSession(state.sessionSec)}`
  );
  if (els.vrPauseLabel) els.vrPauseLabel.setAttribute('value', state.paused ? 'Play' : 'Pause');
}

function formatSession(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m + ':' + (s < 10 ? '0' : '') + s;
}

/* ------------------------------------------------------------------
   Public actions
------------------------------------------------------------------ */
function setSpeed(v) {
  state.speed = Math.max(0.5, Math.min(12, v));
  els.speedSlider.value = String(state.speed);
  updateSliderFill(els.speedSlider);
}
function setSize(v) {
  state.dotSize = Math.max(12, Math.min(80, v));
  els.sizeSlider.value = String(state.dotSize);
  updateSliderFill(els.sizeSlider);
  paintBallCanvas();
  // Saccade balls have fixed plane sizes, so rebuild when size changes during them.
  const name = routines[state.current];
  if (name === 'Horizontal Saccades' || name === 'Vertical Saccades') rebuildMultiBalls();
}
function setRange(v) {
  state.rangeScale = Math.max(0.35, Math.min(1, v / 100));
  els.pathRangeSlider.value = String(Math.round(state.rangeScale * 100));
  updateSliderFill(els.pathRangeSlider);
  const name = routines[state.current];
  if (name === 'Horizontal Saccades' || name === 'Vertical Saccades') resetRoutine();
}
function setPalette(key) {
  state.paletteKey = key;
  paintBallCanvas();
}
function goNext() { state.current = (state.current + 1) % routines.length; els.routineSelect.value = String(state.current); resetRoutine(); }
function goPrev() { state.current = (state.current - 1 + routines.length) % routines.length; els.routineSelect.value = String(state.current); resetRoutine(); }
function togglePause() { state.paused = !state.paused; }
function toggleVrPanel() {
  const p = els.vrPanel;
  if (!p) return;
  p.object3D.visible = !p.object3D.visible;
}

/* ------------------------------------------------------------------
   Bind HTML overlay
------------------------------------------------------------------ */
els.speedSlider.addEventListener('input', e => setSpeed(+e.target.value));
els.sizeSlider .addEventListener('input', e => setSize(+e.target.value));
els.pathRangeSlider.addEventListener('input', e => setRange(+e.target.value));
els.dotColorSelect.addEventListener('change', () => setPalette(els.dotColorSelect.value));
els.routineSelect.addEventListener('change', () => { state.current = +els.routineSelect.value; resetRoutine(); });
document.getElementById('next').onclick = goNext;
document.getElementById('prev').onclick = goPrev;
els.pauseBtn.addEventListener('click', togglePause);
els.enterVrBtn.addEventListener('click', () => {
  const scene = document.querySelector('a-scene');
  if (scene && scene.enterVR) scene.enterVR();
});
els.recenterBtn.addEventListener('click', () => {
  // Move the rig so the user's current head pose is centered facing -Z.
  const rig = document.querySelector('#rig');
  const cam = document.querySelector('#cam');
  if (!rig || !cam) return;
  const camWorld = new THREE.Vector3();
  cam.object3D.getWorldPosition(camWorld);
  rig.object3D.position.x -= camWorld.x;
  rig.object3D.position.z -= camWorld.z;
});

window.addEventListener('keydown', e => {
  const onForm = e.target && e.target.closest && e.target.closest('input, select, textarea');
  if (onForm) return;
  if (e.key === 'ArrowRight') goNext();
  else if (e.key === 'ArrowLeft') goPrev();
  else if (e.key === ' ') { e.preventDefault(); togglePause(); }
  else if (e.key === 'ArrowUp') setSpeed(state.speed + 0.2);
  else if (e.key === 'ArrowDown') setSpeed(state.speed - 0.2);
  else if (e.key === 'h' || e.key === 'H') document.getElementById('overlay').classList.toggle('hidden');
  else if (e.key === 'v' || e.key === 'V') {
    const scene = document.querySelector('a-scene');
    if (scene && !scene.is('vr-mode') && scene.enterVR) scene.enterVR();
  }
});

/* ------------------------------------------------------------------
   Boot
------------------------------------------------------------------ */
updateSliderFill(els.speedSlider);
updateSliderFill(els.sizeSlider);
updateSliderFill(els.pathRangeSlider);
resetRoutine();
syncHud();
</script>
</body>
</html>
